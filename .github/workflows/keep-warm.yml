name: Keep API warm

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf "${{ secrets.SWA_URL }}/api/health" || echo "Ping failed (cold start or deploy in progress)"
